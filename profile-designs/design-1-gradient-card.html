<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Über mich</title>
<style>
    :root {
        --bg-primary: #0f0f0f;
        --bg-secondary: #1a1a1a;
        --bg-tertiary: #2d2d2d;
        --text-primary: #e8e8e8;
        --text-secondary: #b0b0b0;
        --accent: #667eea;
        --accent-light: #764ba2;
        --border: #333;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%;
        min-height: 100%;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        line-height: 1.6;
    }
    body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
    }
    .container {
        max-width: 480px;
        margin: 0 auto;
        padding: 0 15px 30px;
    }
    header {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
        padding: 40px 15px 70px;
        text-align: center;
        margin: 0 -15px;
        margin-top: 0;
        border-radius: 0 0 28px 28px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        position: relative;
    }
    .avatar-wrap {
        position: absolute;
        left: 50%;
        bottom: -55px;
        transform: translateX(-50%);
        width: 110px;
        height: 110px;
        border-radius: 50%;
        padding: 4px;
        background: var(--bg-primary);
        box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    }
    .avatar {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        display: block;
        background: var(--bg-tertiary);
    }
    header p.tag {
        color: white;
        opacity: 0.9;
        font-size: 0.9em;
        letter-spacing: 0.05em;
        text-transform: uppercase;
    }
    main {
        margin-top: 70px;
        text-align: center;
    }
    h1.name {
        font-size: 1.7em;
        margin-bottom: 4px;
    }
    .profession {
        color: var(--text-secondary);
        font-size: 1em;
        margin-bottom: 30px;
    }
    .info-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
        text-align: left;
    }
    .info-card {
        background: var(--bg-secondary);
        border-left: 4px solid var(--accent);
        padding: 16px 18px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 14px;
    }
    .info-icon {
        font-size: 1.4em;
        width: 32px;
        text-align: center;
        flex-shrink: 0;
    }
    .info-text .label {
        font-size: 0.78em;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 2px;
    }
    .info-text .value {
        font-size: 1.05em;
    }
</style>
</head>
<body>
    <div class="container">
        <header>
            <p class="tag">Über mich</p>
            <div class="avatar-wrap">
                <img class="avatar" src="https://placehold.co/220x220/2d2d2d/e8e8e8?text=Foto" alt="Profilbild">
            </div>
        </header>
        <main>
            <h1 class="name">Vorname Nachname</h1>
            <p class="profession">Beruf / Tätigkeit</p>
            <div class="info-list">
                <div class="info-card">
                    <div class="info-icon">🎂</div>
                    <div class="info-text">
                        <div class="label">Geburtsdatum</div>
                        <div class="value">01. Januar 1990</div>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">💼</div>
                    <div class="info-text">
                        <div class="label">Beruf</div>
                        <div class="value">Beruf / Tätigkeit</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
