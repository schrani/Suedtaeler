<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Über mich</title>
<style>
    :root {
        --bg: #faf8f5;
        --card: #ffffff;
        --text-primary: #2b2b2b;
        --text-secondary: #7a7670;
        --accent: #c97b4a;
        --border: #ece7e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%;
        min-height: 100%;
        background: var(--bg);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        line-height: 1.6;
    }
    body {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
    }
    .hero {
        position: relative;
        width: 100%;
        height: 52vh;
        min-height: 320px;
        padding-top: env(safe-area-inset-top);
    }
    .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,0.45) 100%);
    }
    .sheet {
        position: relative;
        margin-top: -32px;
        background: var(--card);
        border-radius: 28px 28px 0 0;
        padding: 28px 24px 40px;
        box-shadow: 0 -8px 24px rgba(0,0,0,0.06);
    }
    .sheet::before {
        content: "";
        display: block;
        width: 40px;
        height: 4px;
        border-radius: 2px;
        background: var(--border);
        margin: 0 auto 20px;
    }
    h1.name {
        font-size: 1.6em;
        text-align: center;
        margin-bottom: 6px;
    }
    .profession {
        text-align: center;
        color: var(--accent);
        font-weight: 600;
        font-size: 0.95em;
        margin-bottom: 28px;
    }
    .divider {
        height: 1px;
        background: var(--border);
        margin: 0 0 24px;
    }
    .detail-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .label {
        color: var(--text-secondary);
        font-size: 0.9em;
    }
    .detail-row .value {
        font-weight: 600;
        font-size: 1em;
        text-align: right;
    }
</style>
</head>
<body>
    <div class="hero">
        <img src="https://placehold.co/800x900/e8e0d5/7a7670?text=Foto" alt="Profilbild">
    </div>
    <div class="sheet">
        <h1 class="name">Vorname Nachname</h1>
        <p class="profession">Beruf / Tätigkeit</p>
        <div class="divider"></div>
        <div class="detail-row">
            <span class="label">Geburtsdatum</span>
            <span class="value">01. Januar 1990</span>
        </div>
        <div class="detail-row">
            <span class="label">Beruf</span>
            <span class="value">Beruf / Tätigkeit</span>
        </div>
    </div>
</body>
</html>
